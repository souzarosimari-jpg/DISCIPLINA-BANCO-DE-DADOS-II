<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
           </tr>

  <h1> Cadastro de Clientes</h1>
  <form action="/cadastrar" method="POST">
    <nav class="label">
      <label for="">CPF</label> <br />
      <input type="text" name="cpf" id="c_cpf" required>
      <br />
      <label for="">Primeiro Nome</label> <br />
      <input type="text" name="primeiro_nome" id="c_primeiro_nome" required>
      <br />
      <label for="" font-align="center">Sobrenome</label> <br />
      <input type="text" name="sobrenome" id="c_sobrenome" required>
      <br />
      <label for="">Idade</label> <br />
      <input type="number" name="idade" step="1" id="c_idade" required>
    </nav>
    <br />
    <button class="button" type="submit">Cadastrar</button>
  </form>
  <h2>Lista de Clientes</h2>
  <table>
       <thead>
        <th>CPF</th>
        <th>Primeiro Nome</th>
        <th>Sobrenome</th>
        <th>Idade</th>
       </thead>
       <tbody>
        {% for clientes in clientes %}
           <tr>
               <td>{{cliente.CPF}}</td>
               <td>{{cliente.primeiro_Nome}}</td>
               <td>{{cliente.Sobrenome}}</td>
               <td>{{cliente.Idade}}</td>
           </tr>
       </tbody>
  </table>
</body>

</html>
